<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>品牌登記 · 管理檢視</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
  :root{--paper:#F5F0E8;--cream:#FEFCF7;--linen:#EDE8DE;--ash:#B8B2A6;--ink:#2A2520;--ink-mid:#5A534C;--ink-soft:#8C857C;--sage:#8BA888;--sage-bg:#EFF4EE;--dust:#C9A97A;--dust-bg:#FAF3E8;--blush:#C4897A;--blush-bg:#FAF0EE;--border:rgba(90,83,76,.14);--border-m:rgba(90,83,76,.24);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--paper);font-family:'Noto Sans TC',-apple-system,sans-serif;color:var(--ink);line-height:1.7;padding:18px 16px 60px;}
  .wrap{max-width:560px;margin:0 auto;}
  h1{font-size:18px;font-weight:500;margin-bottom:14px;}
  .card{background:var(--cream);border:1px solid var(--border-m);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
  label{display:block;font-size:12px;font-weight:500;color:var(--ink-mid);margin-bottom:5px;}
  input,select{width:100%;border:1px solid var(--border-m);border-radius:7px;padding:9px 11px;font-size:14px;font-family:inherit;background:#fff;}
  .btn{display:block;width:100%;padding:11px;border:none;border-radius:8px;background:var(--ink);color:var(--cream);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:12px;}
  .msg{font-size:12px;color:var(--blush);margin-top:8px;}
  .sum{font-size:13px;}
  .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:3px;background:var(--linen);color:var(--ink-soft);margin-right:4px;}
  .tag.on{background:var(--blush-bg);color:#7A3E30;font-weight:500;}
  .bn{font-size:15px;font-weight:500;}
  .meta{font-size:11.5px;color:var(--ink-soft);}
  .intro{font-size:13px;margin:6px 0;}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .thumb{width:84px;height:84px;border-radius:6px;overflow:hidden;border:1px solid var(--border-m);background:var(--linen);display:block;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  a{color:var(--sage);}
  .dl{font-size:11px;margin-top:3px;text-align:center;}
  .thumb{cursor:zoom-in;}
  #lb{position:fixed;inset:0;background:rgba(42,37,32,.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  #lb.on{display:flex;}
  .lb-box{position:relative;background:var(--cream);border-radius:12px;padding:12px;box-shadow:0 12px 50px rgba(0,0,0,.35);}
  #lb-img{display:block;max-width:min(82vw,520px);max-height:74vh;border-radius:6px;}
  .lb-x{position:absolute;top:-12px;right:-12px;width:30px;height:30px;border-radius:50%;background:var(--ink);color:#fff;font-size:15px;line-height:30px;text-align:center;cursor:pointer;}
  .lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.94);color:var(--ink);font-size:23px;line-height:37px;text-align:center;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.22);user-select:none;}
  .lb-prev{left:-14px;} .lb-next{right:-14px;}
  .lb-count{text-align:center;font-size:12px;color:var(--ink-soft);margin-top:8px;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div class="wrap">
  <h1>品牌登記 · 管理檢視</h1>
  <div class="card" id="login">
    <label>管理者密碼</label>
    <input type="password" id="apw" onkeydown="if(event.key==='Enter')go()">
    <button class="btn" onclick="go()">登入</button>
    <div class="msg" id="msg"></div>
  </div>
  <div id="panel"></div>
</div>
<script>
var SB='https://ytlakkxrbookftluulbo.supabase.co', KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0bGFra3hyYm9va2Z0bHV1bGJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDY5MzcsImV4cCI6MjA5NzA4MjkzN30.2b9y-i9Y1niCXWgHFDhNhQ21COxtPde_AE4ixoIW2e4', PW='', ROWS=[];
function rpc(fn,args){return fetch(SB+'/rest/v1/rpc/'+fn,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(args)}).then(function(r){return r.json();});}
function $(id){return document.getElementById(id);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function go(){$('msg').textContent='';var pw=$('apw').value;rpc('booth_admin_list',{admin_password:pw}).then(function(r){if(!r||!r.ok){$('msg').textContent=(r&&r.error)||'失敗';return;}PW=pw;render(r);}).catch(function(){$('msg').textContent='連線失敗';});}
function logout(){PW='';ROWS=[];$('apw').value='';$('panel').innerHTML='';$('login').style.display='block';$('msg').textContent='';window.scrollTo(0,0);}
function render(res){
  $('login').style.display='none';
  ROWS=res.rows||[];
  var water=ROWS.filter(function(r){return r.water;}).length;
  var power=ROWS.filter(function(r){return r.power;}).length;
  var dl=res.config&&res.config.deadline?new Date(res.config.deadline).toLocaleDateString('zh-TW'):'';
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><a href="index.html" style="font-size:12px;color:var(--ink-mid);text-decoration:none">← 返回主頁</a><button onclick="logout()" style="font-size:12px;padding:6px 13px;border:1px solid var(--border-m);border-radius:6px;background:var(--cream);color:var(--ink-mid);cursor:pointer;font-family:inherit">登出</button></div>'
    +'<div class="card"><div style="font-size:14px;font-weight:500;margin-bottom:8px">活動管理</div><div id="ev-list" class="meta">載入中…</div>'
    +'<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><input id="ev-code" placeholder="活動代碼"><input id="ev-name" placeholder="活動名稱"></div>'
    +'<label style="margin-top:8px">資料上傳期限</label><input id="ev-deadline" type="date">'
    +'<button class="btn" onclick="saveEvent()">新增 / 更新活動</button><div class="msg" id="ev-msg"></div></div></div>'
    +'<div class="card"><div style="font-size:14px;font-weight:500;margin-bottom:8px">全域設定</div>'
    +'<label>每家可上傳照片張數</label><input id="set-limit" type="number" min="1" max="20">'
    +'<label style="margin-top:8px">照片壓縮模式</label><select id="set-mode"><option value="print">高畫質（印刷／原圖級）</option><option value="a4">標準（A4 文宣）</option><option value="social">輕量（社群媒體）</option></select>'
    +'<button class="btn" onclick="saveSettings()">儲存設定</button><div class="msg" id="set-msg"></div></div>'
    +'<div class="card sum"><b>共 '+ROWS.length+' 家</b> · 需水源 <b>'+water+'</b> · 需額外電力 <b>'+power+'</b>'+(ROWS.length?'<button onclick="zipAll(this)" style="display:block;margin-top:10px;font-size:12px;padding:9px 14px;border:1px solid var(--sage);border-radius:7px;background:var(--sage-bg);color:#3F6B3D;cursor:pointer;font-family:inherit">📦 打包全部品牌照片</button>':'')+'</div>';
  if(!ROWS.length)h+='<div class="card meta">目前還沒有品牌登記。</div>';
  ROWS.forEach(function(r,i){
    h+='<div class="card"><div style="display:flex;justify-content:space-between;gap:8px"><span class="bn">'+esc(r.brand)+'</span><span class="meta">更新 '+esc(r.updated)+'</span></div>'+
      '<div class="meta">'+esc(r.contact)+' · '+esc(r.email)+(r.phone?' · '+esc(r.phone):'')+'</div>'+
      '<div class="meta">活動：'+esc(r.eventCode||'-')+'</div>'+
      (r.intro?'<div class="intro">'+esc(r.intro)+'</div>':'')+
      '<div style="margin:6px 0"><span class="tag '+(r.water?'on':'')+'">水源：'+(r.water?'需要':'否')+'</span><span class="tag '+(r.power?'on':'')+'">額外電力：'+(r.power?'需要':'否')+'</span></div>'+
      (r.powerDetail?'<div class="meta">電力說明：'+esc(r.powerDetail)+'</div>':'')+
      (r.note?'<div class="meta">備註：'+esc(r.note)+'</div>':'')+
      '<div class="meta" style="margin-top:6px">照片 '+r.photoCount+' 張'+(r.photoCount?' · <a href="#" id="pl-'+i+'" onclick="return showPhotos('+i+')">展開</a> · <a href="#" onclick="return zipBrand('+i+',this)">📦 打包下載</a>':'')+'</div>'+
      '<div class="thumbs" id="ph-'+i+'"></div>'+
      '<div style="text-align:right;margin-top:10px"><a href="#" onclick="return delBrand('+i+')" style="font-size:11px;color:var(--blush)">刪除此品牌</a></div></div>';
  });
  $('panel').innerHTML=h;
  loadEvents(); loadSettings();
}
var EVENTS=[];
function loadEvents(){
  rpc('booth_admin_events',{admin_password:PW}).then(function(r){
    if(!r||!r.ok){if($('ev-list'))$('ev-list').textContent='載入失敗';return;}
    EVENTS=r.events||[];
    var h='';
    EVENTS.forEach(function(e){
      h+='<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--border)">'
        +'<div><b style="font-size:13px;color:var(--ink)">'+esc(e.code)+'</b> <span style="font-size:12px">'+esc(e.name)+'</span>'
        +'<div class="meta">期限 '+esc(e.deadline)+(e.deadlinePassed?'（已截止）':'')+' · '+e.count+' 家</div></div>'
        +'<div style="white-space:nowrap"><a href="#" onclick="return editEvent(\''+esc(e.code)+'\')" style="font-size:12px;margin-right:10px">編輯</a>'
        +'<a href="#" onclick="return delEvent(\''+esc(e.code)+'\')" style="font-size:12px;color:var(--blush)">刪除</a></div></div>';
    });
    $('ev-list').innerHTML = EVENTS.length?h:'<div class="meta">尚無活動</div>';
  });
}
function editEvent(code){
  var e=EVENTS.filter(function(x){return x.code===code;})[0]; if(!e)return false;
  $('ev-code').value=e.code; $('ev-name').value=e.name; $('ev-deadline').value=e.deadline;
  $('ev-msg').style.color='var(--ink-soft)'; $('ev-msg').textContent='編輯中：'+code+'（改完按下方按鈕）';
  return false;
}
function saveEvent(){
  var code=$('ev-code').value.trim(),name=$('ev-name').value.trim(),d=$('ev-deadline').value;
  if(!code||!name||!d){$('ev-msg').style.color='var(--blush)';$('ev-msg').textContent='代碼／名稱／期限皆必填';return;}
  rpc('booth_admin_event_save',{admin_password:PW,p_code:code,p_name:name,p_deadline:d+'T23:59:59+08:00'}).then(function(r){
    if(!r||!r.ok){$('ev-msg').style.color='var(--blush)';$('ev-msg').textContent=(r&&r.error)||'失敗';return;}
    $('ev-code').value='';$('ev-name').value='';$('ev-deadline').value='';$('ev-msg').textContent='';loadEvents();
  });
}
function delEvent(code){
  if(!confirm('確定刪除活動「'+code+'」？'))return false;
  rpc('booth_admin_event_delete',{admin_password:PW,p_code:code}).then(function(r){
    if(!r||!r.ok){alert((r&&r.error)||'刪除失敗');return;}
    loadEvents();
  });
  return false;
}
function delBrand(i){
  var r=ROWS[i]; if(!r)return false;
  var pw=prompt('刪除品牌「'+r.brand+'」？此動作無法復原。\n請再次輸入管理密碼確認：');
  if(!pw)return false;
  rpc('booth_admin_delete_brand',{admin_password:pw,p_email:r.email}).then(function(res){
    if(!res||!res.ok){alert((res&&res.error)||'刪除失敗');return;}
    rpc('booth_admin_list',{admin_password:PW}).then(function(rr){if(rr&&rr.ok)render(rr);});
  });
  return false;
}
function showPhotos(i){
  var a=$('pl-'+i); a.textContent='載入中…';
  rpc('booth_admin_photos',{admin_password:PW,p_email:ROWS[i].email}).then(function(r){
    if(!r||!r.ok){a.textContent='載入失敗';return;}
    var photos=r.photos||[]; var brand=(r.brand||'品牌'); PSETS[i]=photos;
    var h=''; photos.forEach(function(p,k){h+='<div><a class="thumb" href="#" onclick="return openLb('+i+','+k+')"><img src="'+p+'"></a><div class="dl"><a href="'+p+'" download="'+brand+'_'+(k+1)+'.jpg">下載</a></div></div>';});
    $('ph-'+i).innerHTML=h; a.style.display='none';
  }).catch(function(){a.textContent='載入失敗';});
  return false;
}
var PSETS={},LBset=[],LBidx=0,LBbrand='';
function openLb(i,k){LBset=PSETS[i]||[];LBidx=k;LBbrand=(ROWS[i]&&ROWS[i].brand)||'品牌';showLb();return false;}
function showLb(){if(!LBset.length)return;$('lb-img').src=LBset[LBidx];$('lb-count').textContent=(LBidx+1)+' / '+LBset.length;var dl=$('lb-dl');if(dl){dl.href=LBset[LBidx];dl.download=LBbrand+'_'+(LBidx+1)+'.jpg';}var multi=LBset.length>1;document.querySelector('.lb-prev').style.display=multi?'block':'none';document.querySelector('.lb-next').style.display=multi?'block':'none';$('lb').classList.add('on');}
function navLb(d){if(!LBset.length)return;LBidx=(LBidx+d+LBset.length)%LBset.length;showLb();}
function closeLb(){$('lb').classList.remove('on');$('lb-img').src='';}
function dlBlob(b,name){var u=URL.createObjectURL(b);var x=document.createElement('a');x.href=u;x.download=name;document.body.appendChild(x);x.click();x.remove();setTimeout(function(){URL.revokeObjectURL(u);},2000);}
function safeName(s){return (s||'品牌').replace(/[\\/:*?"<>|]/g,'_');}
function zipBrand(i,a){var r=ROWS[i];if(!r||!r.photoCount)return false;var t0=a.textContent;a.textContent='打包中…';
  rpc('booth_admin_photos',{admin_password:PW,p_email:r.email}).then(function(res){
    if(!res||!res.ok){alert('讀取失敗');a.textContent=t0;return;}
    var zip=new JSZip();(res.photos||[]).forEach(function(p,k){var m=/base64,(.+)$/.exec(p);if(m)zip.file(safeName(r.brand)+'_'+(k+1)+'.jpg',m[1],{base64:true});});
    zip.generateAsync({type:'blob'}).then(function(b){dlBlob(b,safeName(r.brand)+'.zip');a.textContent=t0;});
  });return false;}
function zipAll(btn){if(!ROWS.length)return;btn.disabled=true;var orig=btn.textContent,zip=new JSZip(),done=0,total=ROWS.length;
  (function step(){if(done>=total){btn.textContent='產生壓縮檔…';zip.generateAsync({type:'blob'}).then(function(b){dlBlob(b,'全部品牌照片.zip');btn.disabled=false;btn.textContent=orig;});return;}
    var r=ROWS[done];btn.textContent='打包中 '+(done+1)+'/'+total+'…';
    if(!r.photoCount){done++;step();return;}
    rpc('booth_admin_photos',{admin_password:PW,p_email:r.email}).then(function(res){
      if(res&&res.ok){var f=zip.folder(safeName(r.brand));(res.photos||[]).forEach(function(p,k){var m=/base64,(.+)$/.exec(p);if(m)f.file((k+1)+'.jpg',m[1],{base64:true});});}
      done++;step();
    }).catch(function(){done++;step();});
  })();}
function loadSettings(){rpc('booth_admin_settings',{admin_password:PW}).then(function(r){if(!r||!r.ok)return;if($('set-limit'))$('set-limit').value=r.photoLimit;if($('set-mode'))$('set-mode').value=r.compressMode;});}
function saveSettings(){var l=parseInt($('set-limit').value,10),m=$('set-mode').value,x=$('set-msg');rpc('booth_admin_set_config',{admin_password:PW,p_limit:l,p_mode:m}).then(function(r){if(!r||!r.ok){x.style.color='var(--blush)';x.textContent=(r&&r.error)||'失敗';return;}x.style.color='var(--sage)';x.textContent='已儲存';setTimeout(function(){x.textContent='';},2000);});}
</script>
<div id="lb" onclick="closeLb()">
  <div class="lb-box" onclick="event.stopPropagation()">
    <span class="lb-x" onclick="closeLb()">✕</span>
    <span class="lb-nav lb-prev" onclick="navLb(-1)">‹</span>
    <img id="lb-img" alt="">
    <span class="lb-nav lb-next" onclick="navLb(1)">›</span>
    <div class="lb-count"><span id="lb-count"></span> · <a id="lb-dl" download>下載這張</a></div>
  </div>
</div>
</body>
</html>
