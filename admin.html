<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>е“ҒзүҢзҷ»иЁҳ В· з®ЎзҗҶжӘўиҰ–</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
  :root{--paper:#F5F0E8;--cream:#FEFCF7;--linen:#EDE8DE;--ash:#B8B2A6;--ink:#2A2520;--ink-mid:#5A534C;--ink-soft:#8C857C;--sage:#8BA888;--sage-bg:#EFF4EE;--dust:#C9A97A;--dust-bg:#FAF3E8;--blush:#C4897A;--blush-bg:#FAF0EE;--border:rgba(90,83,76,.14);--border-m:rgba(90,83,76,.24);}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--paper);font-family:'Noto Sans TC',-apple-system,sans-serif;color:var(--ink);line-height:1.7;padding:18px 16px 60px;}
  .wrap{max-width:560px;margin:0 auto;}
  h1{font-size:18px;font-weight:500;margin-bottom:14px;}
  .card{background:var(--cream);border:1px solid var(--border-m);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
  label{display:block;font-size:12px;font-weight:500;color:var(--ink-mid);margin-bottom:5px;}
  input{width:100%;border:1px solid var(--border-m);border-radius:7px;padding:9px 11px;font-size:14px;font-family:inherit;}
  .btn{display:block;width:100%;padding:11px;border:none;border-radius:8px;background:var(--ink);color:var(--cream);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:12px;}
  .msg{font-size:12px;color:var(--blush);margin-top:8px;}
  .sum{font-size:13px;}
  .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:3px;background:var(--linen);color:var(--ink-soft);margin-right:4px;}
  .tag.on{background:var(--blush-bg);color:#7A3E30;font-weight:500;}
  .bn{font-size:15px;font-weight:500;}
  .meta{font-size:11.5px;color:var(--ink-soft);}
  .intro{font-size:13px;margin:6px 0;}
  .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .thumb{width:84px;height:84px;border-radius:6px;overflow:hidden;border:1px solid var(--border-m);background:var(--linen);display:block;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  a{color:var(--sage);}
  .dl{font-size:11px;margin-top:3px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <h1>е“ҒзүҢзҷ»иЁҳ В· з®ЎзҗҶжӘўиҰ–</h1>
  <div class="card" id="login">
    <label>з®ЎзҗҶиҖ…еҜҶзўј</label>
    <input type="password" id="apw" onkeydown="if(event.key==='Enter')go()">
    <button class="btn" onclick="go()">зҷ»е…Ҙ</button>
    <div class="msg" id="msg"></div>
  </div>
  <div id="panel"></div>
</div>
<script>
var SB='https://ytlakkxrbookftluulbo.supabase.co', KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0bGFra3hyYm9va2Z0bHV1bGJvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MDY5MzcsImV4cCI6MjA5NzA4MjkzN30.2b9y-i9Y1niCXWgHFDhNhQ21COxtPde_AE4ixoIW2e4', PW='', ROWS=[];
function rpc(fn,args){return fetch(SB+'/rest/v1/rpc/'+fn,{method:'POST',headers:{'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(args)}).then(function(r){return r.json();});}
function $(id){return document.getElementById(id);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function go(){$('msg').textContent='';var pw=$('apw').value;rpc('booth_admin_list',{admin_password:pw}).then(function(r){if(!r||!r.ok){$('msg').textContent=(r&&r.error)||'еӨұж•—';return;}PW=pw;render(r);}).catch(function(){$('msg').textContent='йҖЈз·ҡеӨұж•—';});}
function logout(){PW='';ROWS=[];$('apw').value='';$('panel').innerHTML='';$('login').style.display='block';$('msg').textContent='';window.scrollTo(0,0);}
function render(res){
  $('login').style.display='none';
  ROWS=res.rows||[];
  var water=ROWS.filter(function(r){return r.water;}).length;
  var power=ROWS.filter(function(r){return r.power;}).length;
  var dl=res.config&&res.config.deadline?new Date(res.config.deadline).toLocaleDateString('zh-TW'):'';
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><a href="index.html" style="font-size:12px;color:var(--ink-mid);text-decoration:none">вҶҗ иҝ”еӣһдё»й Ғ</a><button onclick="logout()" style="font-size:12px;padding:6px 13px;border:1px solid var(--border-m);border-radius:6px;background:var(--cream);color:var(--ink-mid);cursor:pointer;font-family:inherit">зҷ»еҮә</button></div>'
    +'<div class="card"><div style="font-size:14px;font-weight:500;margin-bottom:8px">жҙ»еӢ•з®ЎзҗҶ</div><div id="ev-list" class="meta">ијүе…ҘдёӯвҖҰ</div>'
    +'<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px">'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><input id="ev-code" placeholder="жҙ»еӢ•д»Јзўј"><input id="ev-name" placeholder="жҙ»еӢ•еҗҚзЁұ"></div>'
    +'<label style="margin-top:8px">иіҮж–ҷдёҠеӮіжңҹйҷҗ</label><input id="ev-deadline" type="date">'
    +'<button class="btn" onclick="saveEvent()">ж–°еўһ / жӣҙж–°жҙ»еӢ•</button><div class="msg" id="ev-msg"></div></div></div>'
    +'<div class="card sum"><b>е…ұ '+ROWS.length+' е®¶</b> В· йңҖж°ҙжәҗ <b>'+water+'</b> В· йңҖйЎҚеӨ–йӣ»еҠӣ <b>'+power+'</b></div>';
  if(!ROWS.length)h+='<div class="card meta">зӣ®еүҚйӮ„жІ’жңүе“ҒзүҢзҷ»иЁҳгҖӮ</div>';
  ROWS.forEach(function(r,i){
    h+='<div class="card"><div style="display:flex;justify-content:space-between;gap:8px"><span class="bn">'+esc(r.brand)+'</span><span class="meta">жӣҙж–° '+esc(r.updated)+'</span></div>'+
      '<div class="meta">'+esc(r.contact)+' В· '+esc(r.email)+(r.phone?' В· '+esc(r.phone):'')+'</div>'+
      '<div class="meta">жҙ»еӢ•пјҡ'+esc(r.eventCode||'-')+'</div>'+
      (r.intro?'<div class="intro">'+esc(r.intro)+'</div>':'')+
      '<div style="margin:6px 0"><span class="tag '+(r.water?'on':'')+'">ж°ҙжәҗпјҡ'+(r.water?'йңҖиҰҒ':'еҗҰ')+'</span><span class="tag '+(r.power?'on':'')+'">йЎҚеӨ–йӣ»еҠӣпјҡ'+(r.power?'йңҖиҰҒ':'еҗҰ')+'</span></div>'+
      (r.powerDetail?'<div class="meta">йӣ»еҠӣиӘӘжҳҺпјҡ'+esc(r.powerDetail)+'</div>':'')+
      (r.note?'<div class="meta">еӮҷиЁ»пјҡ'+esc(r.note)+'</div>':'')+
      '<div class="meta" style="margin-top:6px">з…§зүҮ '+r.photoCount+' ејө'+(r.photoCount?' В· <a href="#" id="pl-'+i+'" onclick="return showPhotos('+i+')">еұ•й–ӢпјҸдёӢијү</a>':'')+'</div>'+
      '<div class="thumbs" id="ph-'+i+'"></div>'+
      '<div style="text-align:right;margin-top:10px"><a href="#" onclick="return delBrand('+i+')" style="font-size:11px;color:var(--blush)">еҲӘйҷӨжӯӨе“ҒзүҢ</a></div></div>';
  });
  $('panel').innerHTML=h;
  loadEvents();
}
var EVENTS=[];
function loadEvents(){
  rpc('booth_admin_events',{admin_password:PW}).then(function(r){
    if(!r||!r.ok){if($('ev-list'))$('ev-list').textContent='ијүе…ҘеӨұж•—';return;}
    EVENTS=r.events||[];
    var h='';
    EVENTS.forEach(function(e){
      h+='<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--border)">'
        +'<div><b style="font-size:13px;color:var(--ink)">'+esc(e.code)+'</b> <span style="font-size:12px">'+esc(e.name)+'</span>'
        +'<div class="meta">жңҹйҷҗ '+esc(e.deadline)+(e.deadlinePassed?'пјҲе·ІжҲӘжӯўпјү':'')+' В· '+e.count+' е®¶</div></div>'
        +'<div style="white-space:nowrap"><a href="#" onclick="return editEvent(\''+esc(e.code)+'\')" style="font-size:12px;margin-right:10px">з·ЁијҜ</a>'
        +'<a href="#" onclick="return delEvent(\''+esc(e.code)+'\')" style="font-size:12px;color:var(--blush)">еҲӘйҷӨ</a></div></div>';
    });
    $('ev-list').innerHTML = EVENTS.length?h:'<div class="meta">е°ҡз„Ўжҙ»еӢ•</div>';
  });
}
function editEvent(code){
  var e=EVENTS.filter(function(x){return x.code===code;})[0]; if(!e)return false;
  $('ev-code').value=e.code; $('ev-name').value=e.name; $('ev-deadline').value=e.deadline;
  $('ev-msg').style.color='var(--ink-soft)'; $('ev-msg').textContent='з·ЁијҜдёӯпјҡ'+code+'пјҲж”№е®ҢжҢүдёӢж–№жҢүйҲ•пјү';
  return false;
}
function saveEvent(){
  var code=$('ev-code').value.trim(),name=$('ev-name').value.trim(),d=$('ev-deadline').value;
  if(!code||!name||!d){$('ev-msg').style.color='var(--blush)';$('ev-msg').textContent='д»ЈзўјпјҸеҗҚзЁұпјҸжңҹйҷҗзҡҶеҝ…еЎ«';return;}
  rpc('booth_admin_event_save',{admin_password:PW,p_code:code,p_name:name,p_deadline:d+'T23:59:59+08:00'}).then(function(r){
    if(!r||!r.ok){$('ev-msg').style.color='var(--blush)';$('ev-msg').textContent=(r&&r.error)||'еӨұж•—';return;}
    $('ev-code').value='';$('ev-name').value='';$('ev-deadline').value='';$('ev-msg').textContent='';loadEvents();
  });
}
function delEvent(code){
  if(!confirm('зўәе®ҡеҲӘйҷӨжҙ»еӢ•гҖҢ'+code+'гҖҚпјҹ'))return false;
  rpc('booth_admin_event_delete',{admin_password:PW,p_code:code}).then(function(r){
    if(!r||!r.ok){alert((r&&r.error)||'еҲӘйҷӨеӨұж•—');return;}
    loadEvents();
  });
  return false;
}
function delBrand(i){
  var r=ROWS[i]; if(!r)return false;
  var pw=prompt('еҲӘйҷӨе“ҒзүҢгҖҢ'+r.brand+'гҖҚпјҹжӯӨеӢ•дҪңз„Ўжі•еҫ©еҺҹгҖӮ\nи«ӢеҶҚж¬Ўијёе…Ҙз®ЎзҗҶеҜҶзўјзўәиӘҚпјҡ');
  if(!pw)return false;
  rpc('booth_admin_delete_brand',{admin_password:pw,p_email:r.email}).then(function(res){
    if(!res||!res.ok){alert((res&&res.error)||'еҲӘйҷӨеӨұж•—');return;}
    rpc('booth_admin_list',{admin_password:PW}).then(function(rr){if(rr&&rr.ok)render(rr);});
  });
  return false;
}
function showPhotos(i){
  var a=$('pl-'+i); a.textContent='ијүе…ҘдёӯвҖҰ';
  rpc('booth_admin_photos',{admin_password:PW,p_email:ROWS[i].email}).then(function(r){
    if(!r||!r.ok){a.textContent='ијүе…ҘеӨұж•—';return;}
    var photos=r.photos||[]; var brand=(r.brand||'е“ҒзүҢ');
    var h=''; photos.forEach(function(p,k){h+='<div><a class="thumb" href="'+p+'" target="_blank"><img src="'+p+'"></a><div class="dl"><a href="'+p+'" download="'+brand+'_'+(k+1)+'.jpg">дёӢијү</a></div></div>';});
    $('ph-'+i).innerHTML=h; a.style.display='none';
  }).catch(function(){a.textContent='ијүе…ҘеӨұж•—';});
  return false;
}
</script>
</body>
</html>
